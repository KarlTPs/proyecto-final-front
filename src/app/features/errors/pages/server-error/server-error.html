<body class="auth-body">

  <button class="icon-button theme-toggle auth-theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Switch color theme"
          title="Switch color theme">
    <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
  </button>

  <main class="error-page">
    <section class="error-card">
      <a class="auth-brand justify-content-center" routerLink="/books">
        <span class="brand-icon"><i class="bi bi-book-half" aria-hidden="true"></i></span>
        <span><strong>Burrito Lector</strong><small>Centro de errores</small></span>
      </a>

      <img class="error-illustration" src="assets/images/svg/maintenance.svg" alt="Ilustración de mantenimiento">

      <div class="error-code">500</div>
      <h1 class="h3 mb-2">Error del servidor</h1>
      <p class="text-muted mb-4">Algo salió mal de nuestro lado. Intenta de nuevo en unos minutos.</p>

      <div class="d-flex flex-wrap justify-content-center gap-2">
        <a class="btn btn-primary" routerLink="/books">
          <i class="bi bi-book-half" aria-hidden="true"></i> Volver al catálogo
        </a>
        <a class="btn btn-outline-secondary" routerLink="/auth/login">Iniciar sesión</a>
      </div>
    </section>
  </main>

</body>
